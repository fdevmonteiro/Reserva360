trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - "*.md"
      - "docs/**"
      - ".github/**"

pr:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - "*.md"
      - "docs/**"

variables:
  - name: NODE_VERSION
    value: "20"
  - name: JAVA_VERSION
    value: "21"
  - name: NX_BRANCH
    value: $(Build.SourceBranchName)
  - name: NX_HEAD
    value: $(Build.SourceVersion)
  - name: FRONTEND_HML_DIR
    value: "/var/www/reserva360/hml"
  - name: FRONTEND_PROD_DIR
    value: "/var/www/reserva360/prod"
  - name: BACKEND_DIR
    value: "/opt/reserva360/backend"

# ─────────────────────────────────────────────────────────────
# STAGE 1 – Validação (CI)
# Roda em push e PRs de develop e main
# ─────────────────────────────────────────────────────────────
stages:
  - stage: Validacao
    displayName: "Validação (CI)"
    jobs:
      - job: Frontend_Validacao
        displayName: "Frontend – Lint & Typecheck"
        pool:
          name: self-hosted-hml
        steps:
          - checkout: self
            fetchDepth: 0

          - script: npm install
            displayName: "Instalar dependências (root)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: cd apps/reserva-frontend && npm install
            displayName: "Instalar dependências (frontend)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                NX_BASE="origin/$(System.PullRequest.TargetBranch)"
                echo "Rodando nx affected desde $NX_BASE"
                npx nx affected --target=lint --base=$NX_BASE --head=HEAD
              else
                npx nx run reserva-frontend:lint
              fi
            displayName: "Lint (affected em PRs)"
            workingDirectory: $(Build.SourcesDirectory)

      - job: Backend_Validacao
        displayName: "Backend – Testes Unitários"
        pool:
          name: self-hosted-hml
        steps:
          - checkout: self
            fetchDepth: 0

          - script: npm install
            displayName: "Instalar dependências (root)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              chmod +x apps/reserva-backend/mvnw
              npx nx run reserva-backend:test
            displayName: "Testes unitários (Maven)"
            workingDirectory: $(Build.SourcesDirectory)

          - task: PublishTestResults@2
            displayName: "Publicar resultados de testes"
            condition: always()
            inputs:
              testResultsFormat: "JUnit"
              testResultsFiles: "apps/reserva-backend/target/surefire-reports/*.xml"
              failTaskOnFailedTests: true

  # ─────────────────────────────────────────────────────────────
  # STAGE 2 – Build & Preparação de Artefatos
  # Compila frontend (HML e PROD) e backend em paralelo.
  # Backend: renomeia application.properties.example → application.properties
  # (template com #{TOKEN}#) e publica como artefato separado para
  # substituição na etapa de deploy.
  # ─────────────────────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Preparação"
    dependsOn: Validacao
    condition: |
      and(
        succeeded(),
        in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop')
      )
    jobs:
      - job: Build_Frontend_HML
        displayName: "Build Frontend (hml)"
        pool:
          name: self-hosted-hml
        steps:
          - checkout: self

          - script: npm install
            displayName: "Instalar dependências (root)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: cd apps/reserva-frontend && npm install
            displayName: "Instalar dependências (frontend)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: npx nx run reserva-frontend:build:hml
            displayName: "Build Angular (hml)"
            workingDirectory: $(Build.SourcesDirectory)

          - task: PublishPipelineArtifact@1
            displayName: "Publicar artefato frontend-hml"
            inputs:
              targetPath: "$(Build.SourcesDirectory)/apps/reserva-frontend/dist"
              artifact: "frontend-hml"
              publishLocation: "pipeline"

      - job: Build_Frontend_PROD
        displayName: "Build Frontend (production)"
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
        pool:
          name: self-hosted-hml
        steps:
          - checkout: self

          - script: npm install
            displayName: "Instalar dependências (root)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: cd apps/reserva-frontend && npm install
            displayName: "Instalar dependências (frontend)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: npx nx run reserva-frontend:build:production
            displayName: "Build Angular (production)"
            workingDirectory: $(Build.SourcesDirectory)

          - task: PublishPipelineArtifact@1
            displayName: "Publicar artefato frontend-prod"
            inputs:
              targetPath: "$(Build.SourcesDirectory)/apps/reserva-frontend/dist"
              artifact: "frontend-prod"
              publishLocation: "pipeline"

      - job: Build_Backend
        displayName: "Build Backend (JAR)"
        pool:
          name: self-hosted-hml
        steps:
          - checkout: self

          - script: npm install
            displayName: "Instalar dependências (root)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              cp apps/reserva-backend/src/main/resources/application.properties.example \
                 apps/reserva-backend/src/main/resources/application.properties
            displayName: "Preparar application.properties (template)"
            workingDirectory: $(Build.SourcesDirectory)

          - script: |
              chmod +x apps/reserva-backend/mvnw
              npx nx run reserva-backend:build
            displayName: "Build Maven (package)"
            workingDirectory: $(Build.SourcesDirectory)

          - task: CopyFiles@2
            displayName: "Copiar JAR para staging"
            inputs:
              SourceFolder: "$(Build.SourcesDirectory)/apps/reserva-backend/target"
              Contents: "*.jar"
              TargetFolder: "$(Build.ArtifactStagingDirectory)/backend"

          - task: CopyFiles@2
            displayName: "Copiar template de config para staging"
            inputs:
              SourceFolder: "$(Build.SourcesDirectory)/apps/reserva-backend/src/main/resources"
              Contents: "application.properties"
              TargetFolder: "$(Build.ArtifactStagingDirectory)/backend-config"

          - task: PublishPipelineArtifact@1
            displayName: "Publicar artefato backend-jar"
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/backend"
              artifact: "backend-jar"
              publishLocation: "pipeline"

          - task: PublishPipelineArtifact@1
            displayName: "Publicar artefato backend-config (template)"
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/backend-config"
              artifact: "backend-config"
              publishLocation: "pipeline"

  # ─────────────────────────────────────────────────────────────
  # STAGE 3 – Deploy Frontend
  # HML: develop e main | PROD: somente main
  # Requer aprovação manual via environments 'hml' e 'production'
  # ─────────────────────────────────────────────────────────────
  - stage: Deploy_Frontend
    displayName: "Deploy – Frontend"
    dependsOn: Build
    condition: |
      and(
        succeeded(),
        in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop')
      )
    jobs:
      - deployment: Deploy_Frontend_HML
        displayName: "Deploy Frontend HML"
        environment: "hml"
        pool:
          name: self-hosted-hml
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend-hml
                  displayName: "Baixar artefato frontend-hml"

                - script: |
                    sudo mkdir -p $(FRONTEND_HML_DIR)
                    sudo rm -rf $(FRONTEND_HML_DIR)/*
                    sudo cp -r $(Pipeline.Workspace)/frontend-hml/. $(FRONTEND_HML_DIR)/
                    sudo chown -R www-data:www-data $(FRONTEND_HML_DIR)
                    echo "Frontend HML deployado em $(FRONTEND_HML_DIR)"
                  displayName: "Copiar arquivos para Nginx (hml)"

      - deployment: Deploy_Frontend_PROD
        displayName: "Deploy Frontend Produção"
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
        environment: "production"
        pool:
          name: self-hosted-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: frontend-prod
                  displayName: "Baixar artefato frontend-prod"

                - script: |
                    sudo mkdir -p $(FRONTEND_PROD_DIR)
                    sudo rm -rf $(FRONTEND_PROD_DIR)/*
                    sudo cp -r $(Pipeline.Workspace)/frontend-prod/. $(FRONTEND_PROD_DIR)/
                    sudo chown -R www-data:www-data $(FRONTEND_PROD_DIR)
                    echo "Frontend PROD deployado em $(FRONTEND_PROD_DIR)"
                  displayName: "Copiar arquivos para Nginx (prod)"

  # ─────────────────────────────────────────────────────────────
  # STAGE 4 – Deploy Backend HML
  # Replace Tokens substitui #{TOKEN}# usando o library group reserva360-hml.
  # O application.properties resolvido é colocado em config/ ao lado do JAR;
  # o Spring Boot o carrega com prioridade sobre o properties interno do JAR.
  # ─────────────────────────────────────────────────────────────
  - stage: Deploy_Backend_HML
    displayName: "Deploy – Backend HML"
    dependsOn: Deploy_Frontend
    condition: |
      and(
        succeeded(),
        in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop')
      )
    variables:
      - group: reserva360-hml
    jobs:
      - deployment: Deploy_Backend_HML
        displayName: "Deploy Backend HML"
        environment: "hml"
        pool:
          name: self-hosted-hml
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: backend-jar
                  displayName: "Baixar artefato backend-jar"

                - download: current
                  artifact: backend-config
                  displayName: "Baixar template de configuração"

                - task: replacetokens@6
                  displayName: "Substituir variáveis no application.properties (hml)"
                  inputs:
                    targetFiles: "$(Pipeline.Workspace)/backend-config/application.properties"
                    encoding: "auto"
                    tokenPattern: "default"

                - script: |
                    sudo mkdir -p $(BACKEND_DIR)/config
                    sudo cp $(Pipeline.Workspace)/backend-jar/*.jar $(BACKEND_DIR)/reserva-backend.jar
                    sudo cp $(Pipeline.Workspace)/backend-config/application.properties $(BACKEND_DIR)/config/application.properties
                    sudo systemctl restart reserva-backend
                    echo "Aguardando backend iniciar..."
                    sleep 10
                    sudo systemctl status reserva-backend --no-pager
                  displayName: "Deploy JAR + config e reiniciar serviço"

  # ─────────────────────────────────────────────────────────────
  # STAGE 5 – Deploy Backend PROD
  # Mesmo fluxo do HML, mas usando o library group reserva360-prd.
  # Roda somente em main e requer aprovação via environment 'production'.
  # ─────────────────────────────────────────────────────────────
  - stage: Deploy_Backend_PROD
    displayName: "Deploy – Backend Produção"
    dependsOn: Deploy_Backend_HML
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    variables:
      - group: reserva360-prd
    jobs:
      - deployment: Deploy_Backend_PROD
        displayName: "Deploy Backend Produção"
        environment: "production"
        pool:
          name: self-hosted-prod
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: backend-jar
                  displayName: "Baixar artefato backend-jar"

                - download: current
                  artifact: backend-config
                  displayName: "Baixar template de configuração"

                - task: replacetokens@6
                  displayName: "Substituir variáveis no application.properties (prod)"
                  inputs:
                    targetFiles: "$(Pipeline.Workspace)/backend-config/application.properties"
                    encoding: "auto"
                    tokenPattern: "default"

                - script: |
                    sudo mkdir -p $(BACKEND_DIR)/config
                    sudo cp $(Pipeline.Workspace)/backend-jar/*.jar $(BACKEND_DIR)/reserva-backend.jar
                    sudo cp $(Pipeline.Workspace)/backend-config/application.properties $(BACKEND_DIR)/config/application.properties
                    sudo systemctl restart reserva-backend
                    echo "Aguardando backend iniciar..."
                    sleep 10
                    sudo systemctl status reserva-backend --no-pager
                  displayName: "Deploy JAR + config e reiniciar serviço"
